<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — defence-in-depth on top of Electron's
      contextIsolation+sandbox. Kiosk agent only ever connects to the
      configured backend; tighter than the cashier desktop because it
      doesn't load OSM map tiles or any 3rd-party assets.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob: https://cyber-place-server-staging-production.up.railway.app;
      connect-src 'self' https://cyber-place-server-staging-production.up.railway.app;
      base-uri 'self';
      form-action 'none';
      frame-ancestors 'none';
    " />
    <title>Cyberplace Client</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
