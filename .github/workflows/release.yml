name: Release Desktop Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Build Linux AppImage (no auto-publish)
        run: npx electron-builder --linux --publish never
      - name: Upload selected Linux assets to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: |
            release/*.AppImage
            release/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Build Windows NSIS (no auto-publish)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never
      # Hard gate: if signing is configured, every .exe must carry a valid
      # Cyber Place Authenticode signature or the job fails — no unsigned
      # publish. Get-AuthenticodeSignature handles the self-signed cert.
      - name: Verify Windows signatures
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: pwsh
        run: |
          $expected = 'Cyber Place'
          $files = Get-ChildItem -Path release -Recurse -Include *.exe -ErrorAction Stop
          if (-not $files) { throw "No .exe produced under release/" }
          $fail = $false
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f.FullName
            if (-not $sig.SignerCertificate) {
              Write-Error "UNSIGNED: $($f.FullName)"; $fail = $true; continue
            }
            if ($sig.SignerCertificate.Subject -notmatch [regex]::Escape($expected)) {
              Write-Error "WRONG SIGNER: $($f.FullName) -> $($sig.SignerCertificate.Subject)"; $fail = $true; continue
            }
            Write-Host "OK: $($f.Name)  signer=$($sig.SignerCertificate.Subject)  status=$($sig.Status)"
          }
          if ($fail) { throw "One or more .exe files were not signed correctly." }
      - name: Upload selected Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
