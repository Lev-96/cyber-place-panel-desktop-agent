name: Release Desktop Agent (staging)

# Staging release track for the kiosk agent. Triggered by prerelease-style
# tags like v1.0.23-staging.1. Builds against the staging backend
# (Vite --mode staging) and publishes to the `staging` electron-updater
# channel (staging*.yml), marked as a GitHub prerelease so the production
# backend's /releases/latest never picks it up. See electron-builder.staging.json.

on:
  push:
    tags:
      - "v*-staging*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:staging
      - name: Build Linux AppImage (staging channel, no auto-publish)
        run: npx electron-builder --linux --config electron-builder.staging.json --publish never
      - name: Upload selected Linux assets to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            release/*.AppImage
            release/staging-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build:staging
      - name: Build Windows NSIS (staging channel, no auto-publish)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --config electron-builder.staging.json --publish never
      - name: Verify Windows signatures
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: pwsh
        run: |
          $expected = 'Cyber Place'
          $files = Get-ChildItem -Path release -Recurse -Include *.exe -ErrorAction Stop
          if (-not $files) { throw "No .exe produced under release/" }
          $fail = $false
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f.FullName
            if (-not $sig.SignerCertificate) {
              Write-Error "UNSIGNED: $($f.FullName)"; $fail = $true; continue
            }
            if ($sig.SignerCertificate.Subject -notmatch [regex]::Escape($expected)) {
              Write-Error "WRONG SIGNER: $($f.FullName) -> $($sig.SignerCertificate.Subject)"; $fail = $true; continue
            }
            Write-Host "OK: $($f.Name)  signer=$($sig.SignerCertificate.Subject)  status=$($sig.Status)"
          }
          if ($fail) { throw "One or more .exe files were not signed correctly." }
      - name: Upload selected Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/staging.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
